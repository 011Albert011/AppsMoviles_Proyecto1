<ion-header>
  <ion-toolbar>
    <ion-title>
      <span class="app-title">
        <ion-icon name="calculator-outline"></ion-icon>
        Calculadora Científica
      </span>
    </ion-title>
    <ion-buttons slot="end">
      <ion-button id="btn-ver-historial" routerLink="/historial" routerDirection="forward">
        <ion-icon slot="icon-only" name="time-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div class="calc-wrapper">

    <!-- ── PANTALLA DE RESULTADOS ── -->
    <div class="display-card">
      <div class="display-angle-mode">
        <ion-chip
          [color]="angleMode === 'deg' ? 'primary' : 'secondary'"
          (click)="toggleAngleMode()"
          id="btn-angle-mode">
          {{ angleMode === 'deg' ? 'DEG' : 'RAD' }}
        </ion-chip>
      </div>
      <div class="display-expression" id="display-expression">
        {{ expression || '&nbsp;' }}
      </div>
      <div class="display-result" id="display-result"
           [class.display-result--small]="isResultSmall">
        {{ currentInput || '0' }}
      </div>
    </div>

    <!-- ── MENSAJE DE ERROR ── -->
    <div class="error-banner" *ngIf="errorMsg" (click)="clearError()">
      <ion-icon name="alert-circle-outline"></ion-icon>
      <span>{{ errorMsg }}</span>
      <ion-icon name="close-outline" class="error-close"></ion-icon>
    </div>

    <!-- ── TECLADO ── -->
    <div class="kbd">

      <!-- Fila sci 1 -->
      <div class="kbd-row">
        <div class="kbd-col"><ion-button expand="block" class="btn btn-sci" id="btn-sin"   (click)="appendFunction('sin')">sin</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-sci" id="btn-cos"   (click)="appendFunction('cos')">cos</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-sci" id="btn-tan"   (click)="appendFunction('tan')">tan</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-sci" id="btn-log"   (click)="appendFunction('log')">log</ion-button></div>
      </div>

      <!-- Fila sci 2 -->
      <div class="kbd-row">
        <div class="kbd-col"><ion-button expand="block" class="btn btn-sci" id="btn-asin"  (click)="appendFunction('asin')">sin⁻¹</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-sci" id="btn-acos"  (click)="appendFunction('acos')">cos⁻¹</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-sci" id="btn-atan"  (click)="appendFunction('atan')">tan⁻¹</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-sci" id="btn-ln"    (click)="appendFunction('ln')">ln</ion-button></div>
      </div>

      <!-- Fila sci 3 -->
      <div class="kbd-row">
        <div class="kbd-col"><ion-button expand="block" class="btn btn-sci" id="btn-sqrt"  (click)="appendFunction('sqrt')">√</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-sci" id="btn-power" (click)="appendChar('^')">xʸ</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-sci" id="btn-open"  (click)="appendChar('(')">(</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-sci" id="btn-close" (click)="appendChar(')')">)</ion-button></div>
      </div>

      <div class="divider"></div>

      <!-- Fila 4: C ⌫ % ÷ -->
      <div class="kbd-row">
        <div class="kbd-col"><ion-button expand="block" class="btn btn-clear"     id="btn-clear"     (click)="clearAll()">C</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-backspace" id="btn-backspace" (click)="backspace()">⌫</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-op"        id="btn-percent"   (click)="appendChar('%')">%</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-op"        id="btn-div"       (click)="appendChar('/')">÷</ion-button></div>
      </div>

      <!-- Fila 5: 7 8 9 × -->
      <div class="kbd-row">
        <div class="kbd-col"><ion-button expand="block" class="btn btn-num" id="btn-7" (click)="appendChar('7')">7</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-num" id="btn-8" (click)="appendChar('8')">8</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-num" id="btn-9" (click)="appendChar('9')">9</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-op"  id="btn-mul" (click)="appendChar('*')">×</ion-button></div>
      </div>

      <!-- Fila 6: 4 5 6 − -->
      <div class="kbd-row">
        <div class="kbd-col"><ion-button expand="block" class="btn btn-num" id="btn-4" (click)="appendChar('4')">4</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-num" id="btn-5" (click)="appendChar('5')">5</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-num" id="btn-6" (click)="appendChar('6')">6</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-op"  id="btn-sub" (click)="appendChar('-')">−</ion-button></div>
      </div>

      <!-- Fila 7: 1 2 3 + -->
      <div class="kbd-row">
        <div class="kbd-col"><ion-button expand="block" class="btn btn-num" id="btn-1" (click)="appendChar('1')">1</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-num" id="btn-2" (click)="appendChar('2')">2</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-num" id="btn-3" (click)="appendChar('3')">3</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-op"  id="btn-add" (click)="appendChar('+')">+</ion-button></div>
      </div>

      <!-- Fila 8: +/− 0 . = -->
      <div class="kbd-row">
        <div class="kbd-col"><ion-button expand="block" class="btn btn-num"    id="btn-negate" (click)="toggleNegate()">+/−</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-num"    id="btn-0"      (click)="appendChar('0')">0</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-num"    id="btn-dot"    (click)="appendChar('.')">.</ion-button></div>
        <div class="kbd-col"><ion-button expand="block" class="btn btn-equals" id="btn-equals" (click)="calculate()">=</ion-button></div>
      </div>

    </div><!-- /kbd -->

  </div><!-- /calc-wrapper -->

</ion-content>
